<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solisium Almanac — Throne and Liberty</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --void:        #0a0d14;
    --void-2:      #11151f;
    --void-3:      #161c28;
    --brass:       #c9a15c;
    --brass-bright:#f0cf8e;
    --brass-dim:   #7a6238;
    --indigo:      #7c6ce8;
    --indigo-bright:#ab9dff;
    --parchment:   #ece1c6;
    --parchment-dim:#a89f86;
    --ember:       #ff4f3f;
    --line:        rgba(201,161,92,0.18);
    --line-soft:   rgba(201,161,92,0.09);

    --font-display: 'Cinzel', 'Times New Roman', serif;
    --font-body:    'Crimson Pro', Georgia, serif;
    --font-mono:    'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { color-scheme: dark; }

  body {
    font-family: var(--font-body);
    background: var(--void);
    color: var(--parchment);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(124,108,232,0.10), transparent 60%),
      radial-gradient(ellipse 700px 400px at 100% 100%, rgba(201,161,92,0.06), transparent 60%);
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 28px 18px 40px;
  }

  a, button { font-family: inherit; }

  /* ── Header ─────────────────────────────────────────── */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
    padding-bottom: 20px;
    margin-bottom: 26px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 1px;
    background: linear-gradient(90deg, var(--brass), transparent 70%);
  }
  .brand-eyebrow {
    font-family: var(--font-body);
    font-style: italic;
    font-size: 0.72rem;
    color: var(--brass);
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .brand-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.5rem;
    letter-spacing: 0.05em;
    color: var(--parchment);
    text-transform: uppercase;
    line-height: 1.15;
  }
  .brand-title .amp { color: var(--brass); }

  .controls {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .control-group {
    display: flex;
    border: 1px solid var(--line);
    border-radius: 3px;
    overflow: hidden;
  }
  .btn {
    background: var(--void-2);
    border: none;
    color: var(--parchment-dim);
    padding: 6px 13px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.18s;
    border-right: 1px solid var(--line);
    font-family: var(--font-body);
  }
  .control-group .btn:last-child { border-right: none; }
  .btn:hover { color: var(--parchment); background: var(--void-3); }
  .btn.active {
    background: rgba(201,161,92,0.16);
    color: var(--brass-bright);
  }

  /* ── Section label ──────────────────────────────────── */
  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-display);
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--brass);
    margin-bottom: 14px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--line), transparent);
  }
  .section-label .sub-jp {
    font-family: var(--font-body);
    font-style: italic;
    font-weight: 400;
    color: var(--parchment-dim);
    letter-spacing: 0;
    text-transform: none;
    font-size: 0.72rem;
  }

  /* ── World Clock (brass pocket watches) ────────────────── */
  .wc-section { margin-bottom: 30px; }

  .watch-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
  }
  @media (max-width: 640px) {
    .watch-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
  }
  @media (max-width: 380px) {
    .watch-grid { grid-template-columns: repeat(3, 1fr); }
  }

  .watch-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 10px 4px 12px;
    background: var(--void-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
  }
  .watch-item:hover {
    border-color: var(--brass-dim);
    transform: translateY(-1px);
  }
  .watch-item.tz-active {
    border-color: var(--brass);
    background: linear-gradient(180deg, rgba(201,161,92,0.14), rgba(201,161,92,0.04));
    box-shadow: 0 0 0 1px rgba(201,161,92,0.25), 0 4px 14px rgba(201,161,92,0.12);
  }

  .watch-canvas { display: block; width: 68px; height: 68px; }
  @media (max-width: 640px) {
    .watch-canvas { width: 56px; height: 56px; }
  }

  .watch-info { text-align: center; line-height: 1.35; }
  .watch-name {
    font-size: 0.68rem;
    color: var(--parchment-dim);
    white-space: nowrap;
    font-weight: 500;
  }
  .watch-item.tz-active .watch-name { color: var(--brass-bright); }
  .watch-name .flag { font-size: 0.85rem; vertical-align: middle; margin-right: 1px; }
  .watch-digital {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--parchment);
    letter-spacing: 0.02em;
    margin-top: 2px;
  }
  .watch-diff {
    font-size: 0.6rem;
    color: var(--parchment-dim);
    opacity: 0.75;
  }

  .wc-hint {
    font-size: 0.72rem;
    font-style: italic;
    color: var(--parchment-dim);
    margin-top: 12px;
    text-align: center;
    line-height: 1.5;
  }
  .wc-hint .tz-selected-name {
    color: var(--brass-bright);
    font-weight: 600;
    font-style: normal;
  }

  /* ── Sky panel (hero) ───────────────────────────────── */
  .sky-section {
    position: relative;
    background: radial-gradient(ellipse at 50% 0%, var(--void-3), var(--void-2) 70%);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 26px 20px 22px;
    margin-bottom: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }
  .sky-section::before {
    content: '';
    position: absolute;
    top: 0; left: 8%; right: 8%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--brass) 50%, transparent);
    opacity: 0.5;
  }

  .live-badge {
    position: absolute;
    top: 16px;
    left: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--ember);
  }
  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--ember);
    box-shadow: 0 0 7px var(--ember);
    animation: livepulse 1.3s ease-in-out infinite;
  }
  @keyframes livepulse {
    0%, 100% { opacity: 1;   transform: scale(1); }
    50%      { opacity: 0.25; transform: scale(0.65); }
  }
  @media (prefers-reduced-motion: reduce) {
    .live-dot { animation: none; }
  }

  .sky-phase-tag {
    font-family: var(--font-display);
    font-size: 0.64rem;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--parchment-dim);
    margin-bottom: 8px;
  }
  .sky-phase-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .sky-icon { font-size: 1.7rem; line-height: 1; }
  .sky-phase-name {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.7rem;
    letter-spacing: 0.06em;
  }
  .sky-phase-name.day   { color: var(--brass-bright); }
  .sky-phase-name.night { color: var(--indigo-bright); }

  .sky-countdown-title {
    font-size: 0.86rem;
    font-weight: 600;
    color: var(--parchment);
    margin-top: 6px;
    letter-spacing: 0.02em;
  }
  .sky-countdown-num {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: clamp(2.4rem, 12vw, 3.4rem);
    color: #fff;
    letter-spacing: 0.01em;
    line-height: 1.15;
    font-variant-numeric: tabular-nums;
    margin-bottom: 10px;
  }

  /* Sky arc: horizontal sun/moon path */
  .sky-arc-wrap {
    width: 100%;
    max-width: 420px;
    margin: 4px 0 6px;
  }
  .sky-arc-svg { width: 100%; height: auto; display: block; overflow: visible; }
  .sky-arc-marker-emoji {
    font-size: 13px;
    text-anchor: middle;
    dominant-baseline: central;
  }

  .sky-elapsed {
    font-family: var(--font-mono);
    font-size: 0.76rem;
    color: var(--parchment-dim);
    margin-top: 4px;
    letter-spacing: 0.03em;
  }
  .sky-elapsed b { color: var(--parchment); font-weight: 600; }

  .sky-legend {
    display: flex;
    gap: 20px;
    margin-top: 16px;
  }
  .sky-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.68rem;
    color: var(--parchment-dim);
  }
  .sky-legend-swatch {
    width: 10px; height: 10px;
    border-radius: 2px;
  }

  /* ── Itinerary (timeline) ───────────────────────────── */
  .itin-section {
    background: var(--void-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 18px 18px 6px;
    margin-bottom: 26px;
  }

  .itin-list {
    display: flex;
    flex-direction: column;
  }

  .itin-row {
    display: grid;
    grid-template-columns: 62px 20px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 11px 8px;
    border-bottom: 1px solid var(--line-soft);
    border-radius: 6px;
  }
  .itin-row:last-child { border-bottom: none; }

  .itin-row.is-now {
    background: linear-gradient(90deg, rgba(255,79,63,0.10), transparent 75%);
    border-left: 2px solid var(--ember);
    padding-left: 6px;
  }

  .itin-time {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.92rem;
    color: var(--parchment);
    letter-spacing: 0.02em;
  }
  .itin-now-tag {
    font-family: var(--font-mono);
    font-size: 0.56rem;
    font-weight: 700;
    color: var(--ember);
    letter-spacing: 0.06em;
    display: block;
    margin-top: 1px;
  }
  .itin-icon { font-size: 1rem; text-align: center; }
  .itin-phase {
    font-weight: 600;
    font-size: 0.86rem;
    font-family: var(--font-body);
  }
  .itin-phase.day   { color: var(--brass-bright); }
  .itin-phase.night { color: var(--indigo-bright); }
  .itin-duration {
    font-size: 0.7rem;
    color: var(--parchment-dim);
    text-align: right;
    white-space: nowrap;
    font-family: var(--font-mono);
  }

  /* ── Footer ─────────────────────────────────────────── */
  .footer {
    text-align: center;
    font-size: 0.68rem;
    font-style: italic;
    color: var(--parchment-dim);
    opacity: 0.6;
    padding-top: 4px;
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="brand-eyebrow" id="brand-eyebrow">ソリシウム — Throne and Liberty</div>
      <div class="brand-title">SOLISIUM <span class="amp">/</span> ALMANAC</div>
    </div>
    <div class="controls">
      <div class="control-group">
        <button class="btn active" id="btn-jp" onclick="setLang('jp')">日本語</button>
        <button class="btn" id="btn-en" onclick="setLang('en')">EN</button>
      </div>
      <div class="control-group">
        <button class="btn active" id="btn-jst" onclick="setTZ('jst')">JST</button>
        <button class="btn" id="btn-local" onclick="setTZ('local')">LOCAL</button>
      </div>
    </div>
  </div>

  <!-- World Clock -->
  <div class="wc-section">
    <div class="section-label"><span id="wc-label">世界時計</span><span class="sub-jp">World Clocks</span></div>
    <div class="watch-grid" id="watch-grid"></div>
    <div class="wc-hint" id="wc-hint">
      国をクリックすると、下の予定表の時刻表示がその国の時間に切り替わります
      ／ 現在の基準: <span class="tz-selected-name" id="tz-selected-name">日本 (JST)</span>
    </div>
  </div>

  <!-- Sky panel -->
  <div class="sky-section" id="sky-section">
    <div class="live-badge"><span class="live-dot"></span>LIVE</div>

    <div class="sky-phase-tag" id="sky-phase-tag">現在の空</div>
    <div class="sky-phase-row">
      <span class="sky-icon" id="sky-icon">☀️</span>
      <span class="sky-phase-name day" id="sky-phase-name">昼</span>
    </div>
    <div class="sky-countdown-title" id="sky-countdown-title">夜まであと</div>
    <div class="sky-countdown-num" id="sky-countdown-num">01:23:45</div>

    <div class="sky-arc-wrap">
      <svg class="sky-arc-svg" viewBox="0 0 300 110" id="sky-arc-svg">
        <g id="sky-arc-static"></g>
        <g id="sky-arc-marker"></g>
      </svg>
    </div>

    <div class="sky-elapsed" id="sky-elapsed">経過 <b>0</b>分 / 120分</div>

    <div class="sky-legend">
      <div class="sky-legend-item">
        <div class="sky-legend-swatch" style="background:var(--brass);"></div>
        <span id="legend-day">昼 · 120分</span>
      </div>
      <div class="sky-legend-item">
        <div class="sky-legend-swatch" style="background:var(--indigo);"></div>
        <span id="legend-night">夜 · 30分</span>
      </div>
    </div>
  </div>

  <!-- Itinerary -->
  <div class="itin-section">
    <div class="section-label"><span id="itin-label">予定表</span><span class="sub-jp">Next 12 Hours</span></div>
    <div class="itin-list" id="itin-list"></div>
  </div>

  <div class="footer" id="footer">Cycle: 夜 30分 → 昼 120分（計150分）</div>
</div>

<script>
// =====================================================================
// CONFIG
// =====================================================================
const ANCHOR_UTC = "2026-07-12T17:30:00Z";
const CYCLE_MIN  = 150;
const NIGHT_MIN  = 30;
const DAY_MIN    = 120;
const HOURS_AHEAD = 12;

const REGIONS = [
  { jp: "日本",         en: "Japan",       flag: "🇯🇵", tz: "Asia/Tokyo",        jstDiff: 0    },
  { jp: "中国",         en: "China",       flag: "🇨🇳", tz: "Asia/Shanghai",     jstDiff: -1   },
  { jp: "台湾",         en: "Taiwan",      flag: "🇹🇼", tz: "Asia/Taipei",       jstDiff: -1   },
  { jp: "タイ",         en: "Thailand",    flag: "🇹🇭", tz: "Asia/Bangkok",      jstDiff: -2   },
  { jp: "シンガポール", en: "Singapore",   flag: "🇸🇬", tz: "Asia/Singapore",    jstDiff: -1   },
  { jp: "豪州",         en: "Australia",   flag: "🇦🇺", tz: "Australia/Sydney",  jstDiff: null },
  { jp: "ベトナム",     en: "Vietnam",     flag: "🇻🇳", tz: "Asia/Ho_Chi_Minh",  jstDiff: -2   },
];

const I18N = {
  jp: {
    eyebrow: "ソリシウム — Throne and Liberty",
    wc: "世界時計",
    itin: "予定表",
    phase_tag: "現在の空",
    phase_day: "昼", phase_night: "夜",
    cd_until_night: "夜まであと", cd_until_day: "昼まであと",
    elapsed_prefix: "経過", elapsed_unit: "分",
    legend_day: "昼 · 120分", legend_night: "夜 · 30分",
    now_label: "現在",
    footer: "Cycle: 夜 30分 → 昼 120分（計150分）",
    itin_day: "昼", itin_night: "夜",
    itin_min: "分",
    wc_hint_1: "国をクリックすると、下の予定表の時刻表示がその国の時間に切り替わります ／ 現在の基準: ",
  },
  en: {
    eyebrow: "Solisium — Throne and Liberty",
    wc: "World Clocks",
    itin: "Itinerary",
    phase_tag: "Current Sky",
    phase_day: "DAY", phase_night: "NIGHT",
    cd_until_night: "Until Night", cd_until_day: "Until Day",
    elapsed_prefix: "Elapsed", elapsed_unit: "min",
    legend_day: "Day · 120min", legend_night: "Night · 30min",
    now_label: "NOW",
    footer: "Cycle: Night 30min → Day 120min (total 150min)",
    itin_day: "Day", itin_night: "Night",
    itin_min: "min",
    wc_hint_1: "Click a country to retime the itinerary below to its timezone / Current base: ",
  }
};

let lang = 'jp';
let displayTZ = 'Asia/Tokyo';
let selectedRegionIdx = 0;

// =====================================================================
// CORE LOGIC
// =====================================================================
function getPhase(now = new Date()) {
  const anchor = new Date(ANCHOR_UTC);
  const elapsedMin = (now - anchor) / 60000;
  const offset = ((elapsedMin % CYCLE_MIN) + CYCLE_MIN) % CYCLE_MIN;
  const isNight = offset < NIGHT_MIN;
  return {
    phase: isNight ? "night" : "day",
    remainingMin: isNight ? NIGHT_MIN - offset : CYCLE_MIN - offset,
    offset,
    elapsedInPhase: isNight ? offset : offset - NIGHT_MIN,
    phaseDuration: isNight ? NIGHT_MIN : DAY_MIN,
  };
}

function getTimeline(hours = 12) {
  const now = new Date();
  const { phase, remainingMin } = getPhase(now);
  const blocks = [];
  let cursor = new Date(now);
  let cur = phase;
  let left = remainingMin;
  const endTime = new Date(now.getTime() + hours * 3600000);

  while (cursor < endTime) {
    const blockEnd = new Date(cursor.getTime() + left * 60000);
    const clip = blockEnd < endTime ? blockEnd : endTime;
    blocks.push({ phase: cur, start: new Date(cursor), end: clip, rawEnd: new Date(blockEnd) });
    cursor = blockEnd;
    cur = cur === "night" ? "day" : "night";
    left = cur === "night" ? NIGHT_MIN : DAY_MIN;
  }
  return blocks;
}

function pad2(n) { return String(Math.floor(n)).padStart(2, '0'); }

// =====================================================================
// SKY ARC (horizontal sun/moon path, SVG)
// =====================================================================
const ARC_CX = 150, ARC_CY = 100, ARC_R = 90;

function polarPoint(angleDeg) {
  const rad = angleDeg * Math.PI / 180;
  return {
    x: ARC_CX + ARC_R * Math.cos(rad),
    y: ARC_CY - ARC_R * Math.sin(rad),
  };
}

// t: 0 (left, cycle start) -> 1 (right, cycle end). Sweeps left->top->right.
function arcAngleForT(t) { return 180 - t * 180; }

function buildSkyArcStatic() {
  const svgNS = 'http://www.w3.org/2000/svg';
  const g = document.getElementById('sky-arc-static');
  g.innerHTML = '';

  // Baseline
  const base = document.createElementNS(svgNS, 'line');
  base.setAttribute('x1', 40); base.setAttribute('y1', ARC_CY);
  base.setAttribute('x2', 260); base.setAttribute('y2', ARC_CY);
  base.setAttribute('stroke', 'rgba(201,161,92,0.15)');
  base.setAttribute('stroke-width', 1);
  base.setAttribute('stroke-dasharray', '2 4');
  g.appendChild(base);

  const nightFrac = NIGHT_MIN / CYCLE_MIN;
  const p0 = polarPoint(arcAngleForT(0));
  const p1 = polarPoint(arcAngleForT(nightFrac));
  const p2 = polarPoint(arcAngleForT(1));

  const nightPath = document.createElementNS(svgNS, 'path');
  nightPath.setAttribute('d', `M ${p0.x} ${p0.y} A ${ARC_R} ${ARC_R} 0 0 1 ${p1.x} ${p1.y}`);
  nightPath.setAttribute('fill', 'none');
  nightPath.setAttribute('stroke', 'var(--indigo)');
  nightPath.setAttribute('stroke-width', 6);
  nightPath.setAttribute('stroke-linecap', 'round');
  g.appendChild(nightPath);

  const dayPath = document.createElementNS(svgNS, 'path');
  dayPath.setAttribute('d', `M ${p1.x} ${p1.y} A ${ARC_R} ${ARC_R} 0 0 1 ${p2.x} ${p2.y}`);
  dayPath.setAttribute('fill', 'none');
  dayPath.setAttribute('stroke', 'var(--brass)');
  dayPath.setAttribute('stroke-width', 6);
  dayPath.setAttribute('stroke-linecap', 'round');
  g.appendChild(dayPath);

  // Endpoint + boundary dots
  [p0, p1, p2].forEach(p => {
    const dot = document.createElementNS(svgNS, 'circle');
    dot.setAttribute('cx', p.x); dot.setAttribute('cy', p.y);
    dot.setAttribute('r', 2.2);
    dot.setAttribute('fill', 'rgba(236,225,198,0.4)');
    g.appendChild(dot);
  });
}

function updateSkyArcMarker(offset) {
  const svgNS = 'http://www.w3.org/2000/svg';
  const t = offset / CYCLE_MIN;
  const p = polarPoint(arcAngleForT(t));
  const isNight = offset < NIGHT_MIN;

  const g = document.getElementById('sky-arc-marker');
  g.innerHTML = '';

  const glow = document.createElementNS(svgNS, 'circle');
  glow.setAttribute('cx', p.x); glow.setAttribute('cy', p.y);
  glow.setAttribute('r', 9);
  glow.setAttribute('fill', isNight ? 'rgba(171,157,255,0.25)' : 'rgba(240,207,142,0.3)');
  g.appendChild(glow);

  const text = document.createElementNS(svgNS, 'text');
  text.setAttribute('x', p.x); text.setAttribute('y', p.y);
  text.setAttribute('text-anchor', 'middle');
  text.setAttribute('dominant-baseline', 'central');
  text.setAttribute('font-size', '13');
  text.textContent = isNight ? '🌙' : '☀️';
  g.appendChild(text);
}

// =====================================================================
// ANALOG WATCH DRAWING
// =====================================================================
function getTimeParts(tz) {
  const now = new Date();
  const fmt = new Intl.DateTimeFormat('en-US', {
    hour: 'numeric', minute: 'numeric', second: 'numeric',
    hour12: false, timeZone: tz
  });
  const parts = {};
  fmt.formatToParts(now).forEach(p => { parts[p.type] = parseInt(p.value); });
  return { h: parts.hour || 0, m: parts.minute || 0, s: parts.second || 0 };
}

function drawWatch(canvas, tz) {
  const dpr = window.devicePixelRatio || 1;
  const size = canvas.clientWidth || 68;
  if (canvas.width !== size * dpr) {
    canvas.width  = size * dpr;
    canvas.height = size * dpr;
  }
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const cx = size / 2, cy = size / 2;
  const r  = size / 2 - 2;

  ctx.clearRect(0, 0, size, size);

  const bezelGrad = ctx.createLinearGradient(cx - r, cy - r, cx + r, cy + r);
  bezelGrad.addColorStop(0, '#8a6f42');
  bezelGrad.addColorStop(0.5, '#c9a15c');
  bezelGrad.addColorStop(1, '#6b552f');
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = bezelGrad;
  ctx.fill();

  const faceGrad = ctx.createRadialGradient(cx, cy - r * 0.15, r * 0.05, cx, cy, r * 0.86);
  faceGrad.addColorStop(0, '#1c2130');
  faceGrad.addColorStop(1, '#0d1018');
  ctx.beginPath();
  ctx.arc(cx, cy, r - 3, 0, Math.PI * 2);
  ctx.fillStyle = faceGrad;
  ctx.fill();

  for (let i = 0; i < 60; i++) {
    const angle = (i / 60) * Math.PI * 2 - Math.PI / 2;
    const isHour = i % 5 === 0;
    const len   = isHour ? 6.5 : 2.6;
    const width = isHour ? 1.6 : 0.7;
    const color = isHour ? 'rgba(240,207,142,0.9)' : 'rgba(236,225,198,0.28)';
    const rr = r - 6;
    const x1 = cx + Math.cos(angle) * rr;
    const y1 = cy + Math.sin(angle) * rr;
    const x2 = cx + Math.cos(angle) * (rr - len);
    const y2 = cy + Math.sin(angle) * (rr - len);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.stroke();
  }

  const { h, m, s } = getTimeParts(tz);

  const hourAngle = ((h % 12 + m / 60 + s / 3600) / 12) * Math.PI * 2 - Math.PI / 2;
  drawHand(ctx, cx, cy, hourAngle, r * 0.46, 2.3, '#ece1c6', r * 0.12);

  const minAngle = ((m + s / 60) / 60) * Math.PI * 2 - Math.PI / 2;
  drawHand(ctx, cx, cy, minAngle, r * 0.70, 1.6, '#d8cba8', r * 0.13);

  const secAngle = (s / 60) * Math.PI * 2 - Math.PI / 2;
  drawHand(ctx, cx, cy, secAngle, r * 0.76, 0.8, '#ff4f3f', r * 0.16);

  ctx.beginPath();
  ctx.arc(cx, cy, 2.2, 0, Math.PI * 2);
  ctx.fillStyle = '#f0cf8e';
  ctx.fill();
}

function drawHand(ctx, cx, cy, angle, length, width, color, tail = 0) {
  ctx.beginPath();
  if (tail > 0) {
    ctx.moveTo(cx + Math.cos(angle + Math.PI) * tail, cy + Math.sin(angle + Math.PI) * tail);
  } else {
    ctx.moveTo(cx, cy);
  }
  ctx.lineTo(cx + Math.cos(angle) * length, cy + Math.sin(angle) * length);
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.stroke();
}

// =====================================================================
// BUILD WORLD CLOCK GRID
// =====================================================================
function buildWatchGrid() {
  const grid = document.getElementById('watch-grid');
  grid.innerHTML = '';
  REGIONS.forEach((r, i) => {
    const name = lang === 'jp' ? r.jp : r.en;
    const diffStr = computeDiffLabel(r);

    const item = document.createElement('div');
    item.className = 'watch-item' + (i === selectedRegionIdx ? ' tz-active' : '');
    item.innerHTML = `
      <canvas class="watch-canvas" data-tz="${r.tz}" width="136" height="136"></canvas>
      <div class="watch-info">
        <div class="watch-name"><span class="flag">${r.flag}</span>${name}</div>
        <div class="watch-digital" data-digital="${r.tz}">--:--:--</div>
        <div class="watch-diff">${diffStr}</div>
      </div>`;
    item.addEventListener('click', () => selectRegion(i));
    grid.appendChild(item);
  });
  updateWCHint();
}

function computeDiffLabel(r) {
  if (r.jstDiff === 0)         return 'JST';
  if (r.jstDiff !== null)      return `JST${r.jstDiff > 0 ? '+' : ''}${r.jstDiff}h`;
  return computeJSTDiff(r.tz);
}

function computeJSTDiff(tz) {
  const now = new Date();
  const jst   = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Tokyo' }));
  const local = new Date(now.toLocaleString('en-US', { timeZone: tz }));
  const dh = (local - jst) / 3600000;
  if (dh === 0) return 'JST';
  return `JST${dh > 0 ? '+' : ''}${dh}h`;
}

function selectRegion(idx) {
  selectedRegionIdx = idx;
  displayTZ = REGIONS[idx].tz;
  document.querySelectorAll('.watch-item').forEach((el, i) => {
    el.classList.toggle('tz-active', i === idx);
  });
  updateWCHint();
  renderItinerary();
}

function updateWCHint() {
  const T = I18N[lang];
  if (selectedRegionIdx < 0) return;
  const r = REGIONS[selectedRegionIdx];
  const name = lang === 'jp' ? r.jp : r.en;
  const diffStr = computeDiffLabel(r);
  const nameEl = document.getElementById('tz-selected-name');
  if (nameEl) nameEl.textContent = `${name} (${diffStr})`;
  const hintEl = document.getElementById('wc-hint');
  if (hintEl && hintEl.firstChild) hintEl.firstChild.textContent = T.wc_hint_1;
}

function fmtDigital(tz) {
  const now = new Date();
  return new Intl.DateTimeFormat('en-GB', {
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false, timeZone: tz
  }).format(now);
}

function fmtShortTime(date, tz) {
  return new Intl.DateTimeFormat('en-GB', {
    hour: '2-digit', minute: '2-digit', hour12: false, timeZone: tz
  }).format(date);
}

// =====================================================================
// RENDER PHASE + SKY PANEL
// =====================================================================
function renderPhase() {
  const T = I18N[lang];
  const now = new Date();
  const { phase, remainingMin, offset, elapsedInPhase, phaseDuration } = getPhase(now);
  const isNight = phase === 'night';

  document.getElementById('sky-section').classList.toggle('is-night', isNight);

  document.getElementById('sky-icon').textContent = isNight ? '🌙' : '☀️';

  document.getElementById('sky-phase-tag').textContent = T.phase_tag;
  const nameEl = document.getElementById('sky-phase-name');
  nameEl.textContent = isNight ? T.phase_night : T.phase_day;
  nameEl.className = `sky-phase-name ${isNight ? 'night' : 'day'}`;

  document.getElementById('sky-countdown-title').textContent = isNight ? T.cd_until_day : T.cd_until_night;

  const totalSec = Math.max(0, Math.round(remainingMin * 60));
  const hours   = Math.floor(totalSec / 3600);
  const minutes = Math.floor((totalSec % 3600) / 60);
  const seconds = totalSec % 60;
  const timeStr = hours > 0
    ? `${pad2(hours)}:${pad2(minutes)}:${pad2(seconds)}`
    : `${minutes}:${pad2(seconds)}`;
  document.getElementById('sky-countdown-num').textContent = timeStr;

  const elapsedMinInt = Math.floor(elapsedInPhase);
  document.getElementById('sky-elapsed').innerHTML =
    `${T.elapsed_prefix} <b>${elapsedMinInt}</b>${T.elapsed_unit} / ${phaseDuration}${T.elapsed_unit}`;

  updateSkyArcMarker(offset);
}

// =====================================================================
// RENDER ITINERARY (timeline)
// =====================================================================
function renderItinerary() {
  const T = I18N[lang];
  const now = new Date();
  const blocks = getTimeline(HOURS_AHEAD);
  const tz = displayTZ;

  const list = document.getElementById('itin-list');
  list.innerHTML = blocks.map((b, i) => {
    const isCurrent = i === 0;
    const startStr = fmtShortTime(b.rawEnd > now ? b.start : now, tz);
    const endStr   = fmtShortTime(b.rawEnd, tz);
    const durMin   = Math.round((b.rawEnd - b.start) / 60000);
    const isDay    = b.phase === 'day';
    const icon     = isDay ? '☀️' : '🌙';
    const phaseName = isDay ? T.itin_day : T.itin_night;
    const nowTag = isCurrent ? `<span class="itin-now-tag">${T.now_label}</span>` : '';

    return `<div class="itin-row${isCurrent ? ' is-now' : ''}">
      <span class="itin-time">${startStr}${nowTag}</span>
      <span class="itin-icon">${icon}</span>
      <span class="itin-phase ${b.phase}">${phaseName}</span>
      <span class="itin-duration">〜${endStr} (${durMin}${T.itin_min})</span>
    </div>`;
  }).join('');

  document.getElementById('itin-label').textContent = T.itin;
}

// =====================================================================
// RENDER I18N (static text)
// =====================================================================
function renderI18N() {
  const T = I18N[lang];
  document.getElementById('brand-eyebrow').textContent = T.eyebrow;
  document.getElementById('wc-label').textContent      = T.wc;
  document.getElementById('legend-day').textContent    = T.legend_day;
  document.getElementById('legend-night').textContent  = T.legend_night;
  document.getElementById('footer').textContent        = T.footer;

  buildWatchGrid();
}

// =====================================================================
// UPDATE (per-second)
// =====================================================================
function updateWatches() {
  document.querySelectorAll('.watch-canvas[data-tz]').forEach(canvas => {
    drawWatch(canvas, canvas.dataset.tz);
  });
  document.querySelectorAll('[data-digital]').forEach(el => {
    el.textContent = fmtDigital(el.dataset.digital);
  });
}

// =====================================================================
// CONTROLS
// =====================================================================
function setLang(l) {
  lang = l;
  document.getElementById('btn-jp').classList.toggle('active', l === 'jp');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  renderI18N();
  renderPhase();
  renderItinerary();
}

function setTZ(t) {
  const localTZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const newTZ = t === 'jst' ? 'Asia/Tokyo' : localTZ;
  displayTZ = newTZ;
  const matchIdx = REGIONS.findIndex(r => r.tz === newTZ);
  selectedRegionIdx = matchIdx;
  document.querySelectorAll('.watch-item').forEach((el, i) => {
    el.classList.toggle('tz-active', i === matchIdx);
  });
  document.getElementById('btn-jst').classList.toggle('active', t === 'jst');
  document.getElementById('btn-local').classList.toggle('active', t === 'local');
  updateWCHint();
  renderItinerary();
}

// =====================================================================
// MAIN LOOP
// =====================================================================
let prevSec = -1;
function tick() {
  const sec = new Date().getSeconds();
  renderPhase();
  updateWatches();
  if (sec % 30 === 0 && sec !== prevSec) {
    prevSec = sec;
    renderItinerary();
  }
}

// Init
buildSkyArcStatic();
renderI18N();
renderPhase();
renderItinerary();
setInterval(tick, 1000);
</script>

</html>
