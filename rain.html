  html { color-scheme: dark; }
  body {
    font-family: var(--font-body);
    background: var(--void);
    color: var(--parchment);

  }

    max-width: 1180px;
    margin: 0 auto;
    padding: 18px 18px 14px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
  }
  .site-brand { text-decoration: none; display: block; }
  .site-brand-eyebrow {
    display: block;
    font-family: var(--font-body);
    font-style: italic;
    font-size: 0.72rem;
    color: var(--brass);
    letter-spacing: 0.08em;
    margin-bottom: 4px;

  .site-brand-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.4rem;
    letter-spacing: 0.05em;
    color: var(--parchment);
    text-transform: uppercase;
    line-height: 1.15;

    display: flex;
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 18px;
    gap: 6px;
    border-top: 1px solid var(--line-soft);
    border-bottom: 1px solid var(--line);

    content: '';
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 1px;
    background: linear-gradient(90deg, var(--brass), transparent 70%);
  }
  .site-tab {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 13px 22px;
    text-decoration: none;
    color: var(--parchment-dim);
    font-family: var(--font-display);
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    border-bottom: 3px solid transparent;
    margin-bottom: -1px;
    transition: all 0.18s;
  }
  .site-tab-icon {
    font-size: 1.15rem;
    line-height: 1;
    filter: grayscale(0.6) opacity(0.7);
    transition: filter 0.18s;
  }
  .site-tab:hover { color: var(--parchment); background: rgba(201,161,92,0.05); }
  .site-tab.active {
    color: var(--brass-bright);
    border-bottom-color: var(--brass);
    background: linear-gradient(180deg, rgba(201,161,92,0.10), transparent);
  }
  .site-tab.active .site-tab-icon { filter: none; }
  @media (max-width: 480px) {
    .site-tab { padding: 12px 14px; font-size: 0.74rem; }
  }

  .site-footer {
    text-align: center;
    font-size: 0.68rem;
    font-style: italic;
    color: var(--parchment-dim);
    opacity: 0.6;
    padding: 30px 18px 40px;
  }

  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-display);
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--brass);
    margin-bottom: 14px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--line), transparent);
  }
  .section-label .sub-jp {
    font-family: var(--font-body);
    font-style: italic;
    font-weight: 400;
    color: var(--parchment-dim);
    letter-spacing: 0;
    text-transform: none;
    font-size: 0.72rem;
  }

  .rain-main { max-width: 1180px; margin: 0 auto; padding: 26px 18px 10px; }
  .rain-intro {
    font-size: 0.82rem;
    color: var(--parchment-dim);
    margin-bottom: 22px;
    line-height: 1.8;

  .rain-grid {

    grid-template-columns: 1fr 1fr;
    gap: 24px;

    .rain-grid { grid-template-columns: 1fr; }

    border-radius: 14px;
    padding: 20px 20px 18px;

  .rain-panel::before {
    content: '';

    top: 0; left: 8%; right: 8%;

    background: linear-gradient(90deg, transparent, var(--indigo) 50%, transparent);
    opacity: 0.5;

  .rain-panel-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.05rem;
    letter-spacing: 0.04em;
    color: var(--parchment);
    text-align: center;
    margin-bottom: 14px;

    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    return h > 0 ? `${h}:${pad2(m)}:${pad2(s)}` : `${m}:${pad2(s)}`;
  }

  function fmtRelative(ms) {
    const totalMin = Math.max(0, Math.round(ms / 60000));
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    return h > 0 ? `${h}h${m}m` : `${m}m`;
  }

  function fmtClock(ts) {
    return new Intl.DateTimeFormat('en-GB', {
      hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Tokyo'
    }).format(new Date(ts));
  }

  function renderPanel(key, schedule) {
    const now = Date.now();
    const allEvents = expandSchedule(schedule, RAIN_ANCHOR_AS, now, EVENTS_WINDOW_MS);
    const rainEvents = allEvents.filter(e => e.type === 'rain').sort((a, b) => a.start - b.start);
    const current = rainEvents.find(e => e.start <= now && e.end > now);
    const next = current || rainEvents.find(e => e.start > now);

    const iconEl = document.getElementById(`rain-icon-${key}`);
    const statusEl = document.getElementById(`rain-status-${key}`);
    const panelEl = document.getElementById(`rain-panel-${key}`);

    if (next) {
      const isRaining = !!current;
      panelEl.classList.toggle('is-raining', isRaining);
      iconEl.textContent = isRaining ? '🌧️' : '☀️';
      const label = isRaining ? RT.raining : RT.clear;
      const target = isRaining ? current.end : next.start;
      statusEl.innerHTML = `${label} <span class="rain-countdown-num">${fmtDuration(target - now)}</span>`;
    } else {
      iconEl.textContent = '☀️';
      statusEl.textContent = RT.noData;
    }

    // Upcoming rain events list
    const listEl = document.getElementById(`rain-events-${key}`);
    const upcoming = rainEvents.filter(e => e.end > now).slice(0, MAX_EVENTS_SHOWN);
    listEl.innerHTML = upcoming.map(e => `
      <div class="rain-event-row">
        <span class="rain-drop-icon">💧</span>
        <span class="rain-event-time">${fmtClock(e.start)}</span>
        <span class="rain-event-rel">${e.start <= now ? RT.raining : '+' + fmtRelative(e.start - now)}</span>
      </div>
    `).join('');

    document.getElementById(`rain-events-label-${key}`).textContent = RT.eventsLabel;
  }

  function renderAllPanels() {
    renderPanel('default', RAIN_SCHEDULES.default);
    renderPanel('talandre', RAIN_SCHEDULES.talandre);
  }

  document.getElementById('rain-section-label').textContent = RT.section;
  document.getElementById('rain-intro').textContent = RT.intro;
  document.getElementById('rain-panel-title-default').textContent = RT.zoneDefault;
  document.getElementById('rain-panel-title-talandre').textContent = RT.zoneTalandre;
  renderAllPanels();
  setInterval(renderAllPanels, 1000);
})();
</script>
</body>
</html>
